<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') ||
        CSS.supports('top: constant(a)'))
      document.write(
        '<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' +
        (coverSupport ? ', viewport-fit=cover' : '') + '" />')
    </script>
    <title>微澜 PulseRead</title>
    <!--preload-links-->
    <!--app-context-->
    <style>
      /* ===== PC 端手机框架模拟器 ===== */
      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #1a1a2e;
      }

      /* 移动端：直接全屏，不显示框架 */
      @media (max-width: 600px) {
        body {
          background: #F5F5F5;
        }
        .phone-shell {
          display: none !important;
        }
        #app {
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          width: 100% !important;
          height: 100% !important;
          max-width: none !important;
          border-radius: 0 !important;
          overflow: hidden;
        }
      }

      /* PC 端：居中手机框架 */
      @media (min-width: 601px) {
        body {
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        /* 手机外壳 */
        .phone-shell {
          position: relative;
          width: 393px;
          height: 852px;
          background: #1a1a1a;
          border-radius: 54px;
          padding: 14px;
          box-shadow:
            0 0 0 2px #333,
            0 0 0 4px #1a1a1a,
            0 30px 80px rgba(0, 0, 0, 0.6),
            inset 0 0 0 1px rgba(255,255,255,0.08);
          flex-shrink: 0;
        }

        /* 顶部刘海/动态岛 */
        .phone-shell::before {
          content: '';
          position: absolute;
          top: 22px;
          left: 50%;
          transform: translateX(-50%);
          width: 120px;
          height: 34px;
          background: #1a1a1a;
          border-radius: 20px;
          z-index: 10;
          box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
        }

        /* 右侧音量键 */
        .phone-shell::after {
          content: '';
          position: absolute;
          right: -4px;
          top: 160px;
          width: 4px;
          height: 70px;
          background: #2a2a2a;
          border-radius: 0 3px 3px 0;
          box-shadow: 0 90px 0 #2a2a2a;
        }

        /* 左侧电源键 */
        .phone-side-btn {
          position: absolute;
          left: -4px;
          top: 200px;
          width: 4px;
          height: 40px;
          background: #2a2a2a;
          border-radius: 3px 0 0 3px;
          z-index: 10;
        }
        .phone-side-btn::before {
          content: '';
          position: absolute;
          top: -60px;
          left: 0;
          width: 4px;
          height: 32px;
          background: #2a2a2a;
          border-radius: 3px 0 0 3px;
        }
        .phone-side-btn::after {
          content: '';
          position: absolute;
          top: -110px;
          left: 0;
          width: 4px;
          height: 32px;
          background: #2a2a2a;
          border-radius: 3px 0 0 3px;
        }

        /* 屏幕区域 */
        .phone-screen {
          width: 100%;
          height: 100%;
          border-radius: 42px;
          overflow: hidden;
          background: #F5F5F5;
          position: relative;
        }

        /* App 内容 */
        #app {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          width: 100%;
          height: 100%;
          overflow: hidden;
        }

        /* uni-app H5 内部容器高度约束，内部滚动 */
        #app uni-app,
        #app uni-page {
          display: block;
          width: 100%;
          height: 100%;
          overflow: hidden;
        }

        #app uni-page-wrapper {
          display: block;
          width: 100%;
          height: 100%;
          overflow: hidden;
          position: relative;
        }

        /* 页面内容区域：允许滚动 */
        #app uni-page-body {
          display: block;
          width: 100%;
          height: 100%;
          overflow-y: auto;
          overflow-x: hidden;
          -webkit-overflow-scrolling: touch;
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- PC 端手机外壳（移动端通过 CSS 隐藏） -->
    <div class="phone-shell">
      <div class="phone-side-btn"></div>
      <div class="phone-screen">
        <div id="app"><!--app-html--></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
