<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') ||
        CSS.supports('top: constant(a)'))
      document.write(
        '<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' +
        (coverSupport ? ', viewport-fit=cover' : '') + '" />')
    </script>
    <title>微澜 PulseRead</title>
    <!--preload-links-->
    <!--app-context-->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* ===== 移动端：直接全屏 ===== */
      @media (max-width: 600px) {
        body { background: #F5F5F5; }
        .phone-shell { display: none !important; }
        #app {
          position: fixed;
          inset: 0;
          width: 100%;
          height: 100%;
          overflow: hidden;
        }
      }

      /* ===== PC 端：手机框架 ===== */
      @media (min-width: 601px) {
        :root {
          --status-bar-height: 55px;
          --window-top: 55px;
        }

        body {
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }

        /* 手机外壳 */
        .phone-shell {
          position: relative;
          width: 390px;
          height: 844px;
          background: #111;
          border-radius: 55px;
          padding: 12px;
          box-shadow:
            0 0 0 1px #3a3a3a,
            0 0 0 3px #111,
            0 0 0 4px #444,
            0 40px 100px rgba(0,0,0,0.7),
            inset 0 0 0 1px rgba(255,255,255,0.07);
          flex-shrink: 0;
        }

        /* 右侧静音键 */
        .phone-shell::after {
          content: '';
          position: absolute;
          right: -3px;
          top: 180px;
          width: 3px;
          height: 64px;
          background: #2a2a2a;
          border-radius: 0 2px 2px 0;
          box-shadow: 0 100px 0 #2a2a2a;
        }

        /* 左侧按键组 */
        .phone-side-btn {
          position: absolute;
          left: -3px;
          top: 160px;
          width: 3px;
          height: 32px;
          background: #2a2a2a;
          border-radius: 2px 0 0 2px;
          z-index: 10;
        }
        .phone-side-btn::before {
          content: '';
          position: absolute;
          top: 48px;
          left: 0;
          width: 3px;
          height: 60px;
          background: #2a2a2a;
          border-radius: 2px 0 0 2px;
        }
        .phone-side-btn::after {
          content: '';
          position: absolute;
          top: 124px;
          left: 0;
          width: 3px;
          height: 60px;
          background: #2a2a2a;
          border-radius: 2px 0 0 2px;
        }

        /*
         * 屏幕区域
         * transform 创建新的 containing block，
         * 使 uni-app 内所有 position:fixed 元素相对于此容器定位
         */
        .phone-screen {
          position: relative;
          width: 100%;
          height: 100%;
          border-radius: 44px;
          overflow: hidden;
          background: #F5F5F5;
          transform: translateZ(0);
          scrollbar-width: none;
          -ms-overflow-style: none;
        }
        .phone-screen::-webkit-scrollbar { display: none; }

        /* 动态岛 */
        .dynamic-island {
          position: absolute;
          top: 12px;
          left: 50%;
          transform: translateX(-50%);
          width: 126px;
          height: 37px;
          background: #111;
          border-radius: 20px;
          z-index: 99999;
          pointer-events: none;
          box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
        }

        /* App 容器 */
        #app {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          overflow: hidden;
        }

        /* uni-app 根元素 */
        #app uni-app {
          display: block;
          position: relative;
          width: 100%;
          height: 100%;
          overflow: hidden;
        }

        #app uni-page {
          display: block;
          width: 100%;
          height: 100%;
          overflow: hidden;
        }

        #app uni-page-wrapper {
          display: block;
          position: relative;
          width: 100%;
          height: calc(100% - 50px);
          overflow: hidden;
        }

        /* 页面内容：内部滚动 */
        #app uni-page-body {
          display: block;
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          overflow-y: auto;
          overflow-x: hidden;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          -ms-overflow-style: none;
        }
        #app uni-page-body::-webkit-scrollbar { display: none; }

        /* 强制 TabBar 固定在手机屏幕底部 */
        #app uni-tabbar {
          position: absolute !important;
          bottom: 0 !important;
          left: 0 !important;
          right: 0 !important;
          width: 100% !important;
          z-index: 9998 !important;
        }

        /* 全局隐藏所有滚动条 */
        #app *::-webkit-scrollbar { display: none; }
        #app * {
          scrollbar-width: none;
          -ms-overflow-style: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="phone-shell">
      <div class="phone-side-btn"></div>
      <div class="phone-screen">
        <!-- 动态岛浮层 -->
        <div class="dynamic-island"></div>
        <div id="app"><!--app-html--></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // 仅在 PC 端（手机框架模式）注入状态栏高度适配
      if (window.innerWidth > 600) {
        // 动态岛高度：top(12) + height(37) + gap(6) = 55px
        var STATUS_BAR_H = 55;

        // 注入动态样式，使用属性选择器通配符绕过 scoped CSS
        function injectNavBarStyle() {
          var existing = document.getElementById('__nav-bar-fix__');
          if (existing) return;

          var style = document.createElement('style');
          style.id = '__nav-bar-fix__';
          // 使用 :is() 或属性通配符提高优先级
          style.textContent = [
            // 通配所有带 data-v-* scoped 属性的 .nav-bar
            '#app .nav-bar { padding-top: ' + STATUS_BAR_H + 'px !important; }',
            // 针对 feed 页面的特殊处理（fixed 定位的导航栏）
            '#app .nav-bar[style*="position"] { top: 0 !important; padding-top: ' + STATUS_BAR_H + 'px !important; }',
          ].join('\n');
          document.head.appendChild(style);
        }

        // 使用 MutationObserver 监听 DOM 变化，确保在 uni-app 渲染后注入
        var observer = new MutationObserver(function(mutations) {
          var navBar = document.querySelector('.nav-bar');
          if (navBar) {
            injectNavBarStyle();
            // 直接操作已渲染的 nav-bar 元素，强制设置 padding-top
            var allNavBars = document.querySelectorAll('.nav-bar');
            allNavBars.forEach(function(el) {
              el.style.setProperty('padding-top', STATUS_BAR_H + 'px', 'important');
            });
          }
        });

        // 在 DOM 加载完成后启动观察
        document.addEventListener('DOMContentLoaded', function() {
          observer.observe(document.body, {
            childList: true,
            subtree: true
          });
        });

        // 路由切换时重新应用（uni-app SPA 路由跳转）
        window.addEventListener('hashchange', function() {
          setTimeout(function() {
            var allNavBars = document.querySelectorAll('.nav-bar');
            allNavBars.forEach(function(el) {
              el.style.setProperty('padding-top', STATUS_BAR_H + 'px', 'important');
            });
          }, 100);
        });
      }
    </script>
  </body>
</html>
